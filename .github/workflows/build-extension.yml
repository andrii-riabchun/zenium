name: Extension CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-extension.yml"
      - "package.json"
      - "package-lock.json"
      - "popup.html"
      - "public/**"
      - "src/**"
      - "tsconfig*.json"
      - "vite.config.*"
      - "options.html"
  pull_request:
    paths:
      - ".github/workflows/build-extension.yml"
      - "package.json"
      - "package-lock.json"
      - "popup.html"
      - "public/**"
      - "src/**"
      - "tsconfig*.json"
      - "vite.config.*"
      - "options.html"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      archive_name: ${{ steps.package.outputs.archive_name }}
      version: ${{ steps.package.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension zip
        id: package
        run: |
          set -euo pipefail
          VERSION=$(node --input-type=module -e "import fs from 'node:fs'; const manifest = JSON.parse(fs.readFileSync('dist/manifest.json', 'utf8')); process.stdout.write(manifest.version);")
          ARCHIVE_NAME="zenium-${VERSION}.zip"
          mkdir -p release
          (
            cd dist
            zip -rq "../release/${ARCHIVE_NAME}" . -x "*.DS_Store"
          )
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          path: release/${{ steps.package.outputs.archive_name }}
          archive: false
          if-no-files-found: error

      - name: Write build summary
        run: |
          {
            echo "## Build"
            echo ""
            echo "- Package: \`${{ steps.package.outputs.archive_name }}\`"
            echo "- Version: \`${{ steps.package.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.archive_name }}
          path: release

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ needs.build.outputs.version }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error title=Tag/version mismatch::Expected tag '$EXPECTED_TAG' for manifest version '$PACKAGE_VERSION', got '$RELEASE_TAG'."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error title=Tag is not on main::Release tags must point to a commit that is already reachable from main."
            exit 1
          fi

      - name: Create or update GitHub release
        id: publish_release
        env:
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          ASSET_PATH="release/${ARCHIVE_NAME}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$ASSET_PATH" --title "$RELEASE_TAG" --generate-notes
          fi

          RELEASE_URL=$(gh release view "$RELEASE_TAG" --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        env:
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ steps.publish_release.outputs.release_url }}
        run: |
          {
            echo "## Release"
            echo ""
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Asset: \`${ARCHIVE_NAME}\`"
            echo "- Release: ${RELEASE_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
